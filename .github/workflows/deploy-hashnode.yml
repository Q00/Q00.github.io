name: Deploy Blog (Markdown backup)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Triggered by Q00/blog-backup when a new post is published.
  repository_dispatch:
    types: [content-updated]
  # Manual trigger for republishing
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'repository_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout blog content (Q00/blog-backup)
        uses: actions/checkout@v4
        with:
          repository: Q00/blog-backup
          ref: main
          token: ${{ secrets.BLOG_BACKUP_TOKEN }}
          path: apps/blog/content

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages
        run: pnpm build:packages

      # Build blog from the local Markdown backup (no Hashnode API)
      - name: Build blog for production
        run: pnpm build:blog
        env:
          NODE_ENV: production
          # Site configuration
          VITE_SITE_URL: https://wpti.dev
          VITE_SITE_TITLE: "When Pressure Turns into Inspiration"
          VITE_SITE_DESCRIPTION: "When Pressure Turns into Inspiration"
          VITE_AUTHOR_NAME: "JQ"
          VITE_AUTHOR_EMAIL: "jqyu.lee@gmail.com"
          VITE_POSTS_PER_PAGE: 10
          VITE_FEATURED_POSTS_COUNT: 3
          VITE_GITHUB_CLIENT_ID: ""

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/blog/dist
          cname: wpti.dev

  lighthouse-audit:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v4
      - name: Wait for deployment
        run: sleep 30
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://wpti.dev
            https://wpti.dev/posts
            https://wpti.dev/about
          uploadArtifacts: false
          temporaryPublicStorage: true
